# Alembic configuration for OpenKB Phase 0 Postgres schema migrations.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migrations directory (relative to this file)
script_location = openkb/db/migrations

# Filename template for new migration files — includes timestamp prefix so
# multiple revisions created in the same second are ordered correctly.
file_template = %%(rev)s_%%(slug)s

# Timezone for --autogenerate timestamps in migration file headers
timezone = UTC

# sqlalchemy.url is intentionally left blank here; it is read from
# DATABASE_URL at runtime inside env.py so no credentials ever appear in
# committed files (FR-012).
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
