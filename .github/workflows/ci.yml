name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build all images
        run: docker compose build

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --extra mcp

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

      - name: Start Postgres + Azurite
        run: |
          cp .env.example .env
          docker compose up -d --wait postgres migrate azurite

      - name: Run DB & integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://openkb:openkb@localhost:5433/openkb?sslmode=disable
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1"
          SIDECAR_CMD: "echo noop"
          KB_ID: "00000000-0000-0000-0000-000000000001"
          QUEUE_BACKEND: postgres
        run: uv run pytest tests/db/ tests/integration/ -v

      - name: Tear down
        if: always()
        run: docker compose down -v
