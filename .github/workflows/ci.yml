name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  isolation-tests:
    name: Isolation Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        run: |
          cp .env.example .env
          sed -i "s|LLM_API_KEY=your-key-here|LLM_API_KEY=${{ secrets.LLM_API_KEY }}|" .env
          docker compose up -d --wait postgres migrate azurite generator-api compiler-worker

      - name: Run isolation tests
        run: |
          docker compose --profile test run --rm isolation-tests

      - name: Tear down
        if: always()
        run: docker compose down -v
