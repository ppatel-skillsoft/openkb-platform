# OpenKB local development stack
#
# Services:
#   postgres         — Postgres 15 (Phase 0 data layer; pgdata volume for persistence)
#   migrate          — Runs `alembic upgrade head` once Postgres is healthy
#   azurite          — Azure Blob Storage emulator (AzureBlobStorageBackend)
#   api              — OpenKB FastAPI service (acts as sidecar for compiler-worker)
#   compiler-worker  — Background compilation worker (Postgres SKIP LOCKED queue)
#   generator-api    — Query / answer service (port 8001)
#
# Quick start (Phase 0 DB only):
#   cp .env.example .env
#   docker compose up postgres migrate --wait
#
# Full stack:
#   cp .env.docker .env          # fill in LLM_API_KEY
#   docker compose up --wait
#   curl http://localhost:8000/docs

services:

  # ---------------------------------------------------------------------------
  # postgres — Phase 0 data layer
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: openkb-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openkb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openkb}
      POSTGRES_DB: ${POSTGRES_DB:-openkb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-openkb}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # migrate — applies Alembic migrations once Postgres is healthy (FR-009)
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      target: migrate
    container_name: openkb-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openkb}:${POSTGRES_PASSWORD:-openkb}@postgres:5432/${POSTGRES_DB:-openkb}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: openkb-azurite
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck --loose
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # redis — REMOVED (replaced by Postgres SKIP LOCKED queue in spec 007)
  # Opt-in: set QUEUE_BACKEND=redis and restore this block + REDIS_URL env var.
  # ---------------------------------------------------------------------------

  api:
    build:
      context: .
      target: api
    container_name: openkb-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Azurite connection string — the only local↔production difference.
      # In real Azure deployment replace with your storage account credentials.
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1"
      AZURE_KB_CONTAINER: openkb
    volumes:
      # Mount host Copilot token so the container can use github_copilot/* models
      - ~/.config/litellm:/home/openkb/.config/litellm
    depends_on:
      azurite:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # compiler-worker — consumes Postgres SKIP LOCKED jobs and drives the sidecar
  # ---------------------------------------------------------------------------
  compiler-worker:
    build:
      context: .
      dockerfile: Dockerfile.compiler-worker
    container_name: openkb-compiler-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-openkb}:${POSTGRES_PASSWORD:-openkb}@postgres:5432/${POSTGRES_DB:-openkb}"
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1"
      SIDECAR_CMD: "uvicorn openkb.api.app:app"
      KB_ID: "00000000-0000-0000-0000-000000000001"
      QUEUE_BACKEND: "postgres"
      LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep -q '[p]ython -m compiler_worker'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  generator-api:
    build:
      context: .
      dockerfile: Dockerfile.generator-api
    container_name: openkb-generator-api
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-openkb}:${POSTGRES_PASSWORD:-openkb}@postgres:5432/${POSTGRES_DB:-openkb}"
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1"
      AZURE_KB_CONTAINER: "openkb"
      GENERATOR_HOST: "0.0.0.0"
      GENERATOR_PORT: "8001"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

volumes:
  pgdata:
  azurite_data:
